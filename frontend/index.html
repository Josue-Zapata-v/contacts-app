<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contactos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a32;
      --accent: #6cffb3;
      --accent2: #ff6c9d;
      --text: #f0f0f5;
      --muted: #7a7a8c;
      --danger: #ff4f4f;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Fondo con puntos */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #2a2a3a 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -1px;
    }

    .logo span { color: var(--accent); }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.35rem 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Formulario */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      margin-bottom: 2rem;
      animation: slideDown 0.4s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1.2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
    }

    .form-grid .full { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 70px; }

    .btn-row {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.2rem;
    }

    button {
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.4rem;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #0e0e11;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-add {
      background: var(--accent);
      color: #0e0e11;
      padding: 0.6rem 1.4rem;
      border-radius: 50px;
      font-size: 0.85rem;
    }

    /* Lista de contactos */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .list-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.2rem 0.7rem;
      border-radius: 50px;
    }

    .contacts-grid {
      display: grid;
      gap: 0.75rem;
    }

    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .contact-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0e0e11;
      flex-shrink: 0;
    }

    .contact-info { flex: 1; min-width: 0; }

    .contact-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
    }

    .contact-meta span {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .contact-meta .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .contact-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 0.9rem;
    }

    .btn-edit {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .btn-delete {
      background: var(--surface2);
      color: var(--danger);
      border: 1px solid var(--border);
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .empty p { font-size: 0.9rem; }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.75rem 1.4rem;
      border-radius: 50px;
      z-index: 999;
      animation: toastIn 0.3s ease;
    }

    .toast.error {
      border-color: var(--danger);
      color: var(--danger);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 580px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .contact-meta { gap: 0.5rem; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">contact<span>os</span></div>
    <span class="badge">AWS · Node · PostgreSQL</span>
  </header>

  <!-- Formulario -->
  <div class="form-card">
    <div class="form-title" id="form-title">Nuevo contacto</div>
    <div class="form-grid">
      <div>
        <label>Nombre *</label>
        <input id="f-name" type="text" placeholder="Juan Pérez" />
      </div>
      <div>
        <label>Teléfono</label>
        <input id="f-phone" type="tel" placeholder="+51 999 999 999" />
      </div>
      <div>
        <label>Email</label>
        <input id="f-email" type="email" placeholder="juan@email.com" />
      </div>
      <div>
        <label>Dirección</label>
        <input id="f-address" type="text" placeholder="Av. Lima 123" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveContact()">Guardar contacto</button>
      <button class="btn-secondary" onclick="resetForm()">Cancelar</button>
    </div>
  </div>

  <!-- Lista -->
  <div class="list-header">
    <span class="list-title">Mis contactos</span>
    <span class="count-badge" id="count">0</span>
  </div>

  <div class="contacts-grid" id="contacts-list">
    <div class="empty">
      <div class="empty-icon">📭</div>
      <p>No hay contactos aún.<br/>Agrega tu primero arriba.</p>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:3000/api/contacts';
  let editingId = null;

  async function fetchContacts() {
    try {
      const res = await fetch(API);
      const data = await res.json();
      renderContacts(data);
    } catch {
      showToast('Error al conectar con la API', true);
    }
  }

  function renderContacts(contacts) {
    const list = document.getElementById('contacts-list');
    document.getElementById('count').textContent = contacts.length;

    if (!contacts.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <p>No hay contactos aún.<br/>Agrega tu primero arriba.</p>
        </div>`;
      return;
    }

    list.innerHTML = contacts.map(c => `
      <div class="contact-card" id="card-${c.id}">
        <div class="avatar">${c.name.charAt(0).toUpperCase()}</div>
        <div class="contact-info">
          <div class="contact-name">${esc(c.name)}</div>
          <div class="contact-meta">
            ${c.phone  ? `<span class="tag">📞 ${esc(c.phone)}</span>` : ''}
            ${c.email  ? `<span class="tag">✉️ ${esc(c.email)}</span>` : ''}
            ${c.address? `<span class="tag">📍 ${esc(c.address)}</span>` : ''}
          </div>
        </div>
        <div class="contact-actions">
          <button class="btn-icon btn-edit" onclick="editContact(${c.id})" title="Editar">✏️</button>
          <button class="btn-icon btn-delete" onclick="deleteContact(${c.id})" title="Eliminar">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  async function saveContact() {
    const name    = document.getElementById('f-name').value.trim();
    const phone   = document.getElementById('f-phone').value.trim();
    const email   = document.getElementById('f-email').value.trim();
    const address = document.getElementById('f-address').value.trim();

    if (!name) { showToast('El nombre es requerido', true); return; }

    const body = { name, phone, email, address };
    const method = editingId ? 'PUT' : 'POST';
    const url    = editingId ? `${API}/${editingId}` : API;

    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error();
      showToast(editingId ? 'Contacto actualizado ✓' : 'Contacto creado ✓');
      resetForm();
      fetchContacts();
    } catch {
      showToast('Error al guardar', true);
    }
  }

  async function editContact(id) {
    try {
      const res = await fetch(`${API}/${id}`);
      const c = await res.json();
      document.getElementById('f-name').value    = c.name    || '';
      document.getElementById('f-phone').value   = c.phone   || '';
      document.getElementById('f-email').value   = c.email   || '';
      document.getElementById('f-address').value = c.address || '';
      document.getElementById('form-title').textContent = 'Editar contacto';
      editingId = id;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch {
      showToast('Error al cargar contacto', true);
    }
  }

  async function deleteContact(id) {
    if (!confirm('¿Eliminar este contacto?')) return;
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      showToast('Contacto eliminado');
      fetchContacts();
    } catch {
      showToast('Error al eliminar', true);
    }
  }

  function resetForm() {
    ['f-name','f-phone','f-email','f-address'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('form-title').textContent = 'Nuevo contacto';
    editingId = null;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  let toastTimer;
  function showToast(msg, error = false) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    clearTimeout(toastTimer);
    const t = document.createElement('div');
    t.className = 'toast' + (error ? ' error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    toastTimer = setTimeout(() => t.remove(), 3000);
  }

  fetchContacts();
</script>
</body>
</html>
